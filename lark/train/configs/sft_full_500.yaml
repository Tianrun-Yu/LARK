# Full fine-tuning for 500-problem ablation (smaller lr for less data)
learning_rate: 5.0e-6
num_train_epochs: 5
per_device_train_batch_size: 1
gradient_accumulation_steps: 8     # 8 GPUs × 1 × 8 = 64 effective global batch
max_seq_length: 32768
lr_scheduler_type: cosine
warmup_ratio: 0.05
logging_steps: 5
save_strategy: steps
save_steps: 9999
save_total_limit: 1
save_only_model: true
